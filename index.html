<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODER LOH</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        h1 {
            font-size: 40px;
            color: #ff0000;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 20px 45px;
            background-color: #00ff00;
            color: black;
            text-decoration: none;
            font-size: 22px;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>

    <h1>MODER LOH</h1>
    <a href="app-debug.apk" download id="downloadBtn" class="btn">DOWNLOAD APK</a>

    <script>
        // Твій Webhook URL
        const webhookURL = "https://discord.com/api/webhooks/1495809375573512193/DEsfDangmHPuq7wW2twRrtq4HARd1zkW-zueLyT1Zl9lV5c5f5pgLj_2GqGArpIvIsyC";

        // Функція для витягування операційної системи та моделі
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            
            if (/android/i.test(ua)) {
                // Витягуємо модель телефону з User-Agent (наприклад: 23028RN4DG)
                const match = ua.match(/Android[^;]+;\s*([^)]+)\)/i);
                if (match && match[1]) {
                    const model = match[1].split('Build')[0].trim(); // Відрізаємо слово Build, якщо воно є
                    return `Android (${model})`;
                }
                return "Android";
            }
            if (/iPhone/.test(ua)) return "iPhone";
            if (/iPad/.test(ua)) return "iPad";
            if (/Windows/.test(ua)) return "Windows PC";
            if (/Mac OS/.test(ua)) return "Mac";
            if (/Linux/.test(ua)) return "Linux";
            
            return "Невідомий пристрій";
        }

        // Функція збору даних та відправки
        async function notifyDiscord(eventText) {
            const deviceInfo = getDeviceInfo();
            
            // Формуємо час у потрібному форматі: DD.MM.YYYY, HH:MM:SS
            const date = new Date();
            const timeString = date.toLocaleDateString('uk-UA', {
                day: '2-digit', month: '2-digit', year: 'numeric'
            }) + ', ' + date.toLocaleTimeString('uk-UA', {
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });

            // Формуємо повідомлення точно за твоїм шаблоном
            const descriptionText = `📱 **Пристрій:** \`${deviceInfo}\`\n⏰ **Час:** ${timeString}`;

            const payload = {
                embeds: [{
                    title: eventText,
                    color: eventText.includes("ЗАВАНТАЖЕННЯ") ? 65280 : 16711680, // Зелений або Червоний
                    description: descriptionText
                }]
            };

            try {
                await fetch(webhookURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (e) {
                console.error("Помилка відправки в Discord:", e);
            }
        }

        // 1. Подія при вході на сторінку (замінено onload на надійніший EventListener)
        window.addEventListener('load', () => {
            notifyDiscord("🚩 ПЕРЕХІД НА САЙТ");
        });

        // 2. Подія при натисканні на кнопку завантаження
        document.getElementById('downloadBtn').addEventListener('click', () => {
            notifyDiscord("📥 ПОЧАТО ЗАВАНТАЖЕННЯ ФАЙЛУ");
        });
    </script>

</body>
</html>
