<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        h1 {
            font-size: 40px;
            color: #ff0000;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 20px 45px;
            background-color: #00ff00;
            color: black;
            text-decoration: none;
            font-size: 22px;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>MODER LOH</h1>
    <a href="app-debug.apk" download class="btn" id="downloadBtn">DOWNLOAD APK</a>

    <script>
        const webhookURL = "https://discord.com/api/webhooks/1495809375573512193/DEsfDangmHPuq7wW2twRrtq4HARd1zkW-zueLyT1Zl9lV5c5f5pgLj_2GqGArpIvIsyC";

        // Функція для відправки повідомлення в Discord
        async function sendToDiscord(message) {
            try {
                await fetch(webhookURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: message })
                });
            } catch (error) {
                console.error('Помилка відправки в Discord:', error);
            }
        }

        // Визначаємо модель телефону/браузера
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) return "Android Device";
            if (/iPad|iPhone|iPod/.test(ua)) return "iOS Device";
            return "PC / Unknown";
        }

        // 1. Повідомлення про вхід на сторінку
        window.onload = () => {
            const device = getDeviceInfo();
            const userAgentRaw = navigator.userAgent;
            sendToDiscord(`🔔 **Новий візит на сторінку!**\n📱 Пристрій: ${device}\nℹ️ Інфо: \`${userAgentRaw}\``);
        };

        // 2. Повідомлення про натискання кнопки скачування
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const device = getDeviceInfo();
            sendToDiscord(`📥 **Користувач почав скачування файлу!**\n📱 Пристрій: ${device}`);
        });
    </script>
</body>
</html>
