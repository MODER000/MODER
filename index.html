<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODER LOH</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        h1 {
            font-size: 40px;
            color: #ff0000;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 20px 45px;
            background-color: #00ff00;
            color: black;
            text-decoration: none;
            font-size: 22px;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>

    <h1>MODER LOH</h1>
    <a href="app-debug.apk" download id="downloadBtn" class="btn">DOWNLOAD APK</a>

    <script>
        // Твій Webhook URL
        const webhookURL = "https://discord.com/api/webhooks/1495809375573512193/DEsfDangmHPuq7wW2twRrtq4HARd1zkW-zueLyT1Zl9lV5c5f5pgLj_2GqGArpIvIsyC";

        // Функція збору даних та відправки
        async function notifyDiscord(eventText) {
            const deviceData = navigator.userAgent; // Отримуємо інформацію про телефон/браузер
            const payload = {
                embeds: [{
                    title: eventText,
                    color: eventText.includes("ЗАВАНТАЖЕННЯ") ? 65280 : 16711680, // Зелений або Червоний
                    fields: [
                        { name: "📱 Пристрій (User-Agent)", value: "```" + deviceData + "```" },
                        { name: "⏰ Час", value: new Date().toLocaleString(), inline: true }
                    ]
                }]
            };

            try {
                await fetch(webhookURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (e) {
                console.error("Помилка відправки:", e);
            }
        }

        // 1. Подія при вході на сторінку
        window.onload = () => {
            notifyDiscord("🚩 НОВИЙ ПЕРЕХІД ПО ПОСИЛАННЮ");
        };

        // 2. Подія при натисканні на кнопку завантаження
        document.getElementById('downloadBtn').addEventListener('click', () => {
            notifyDiscord("📥 ПОЧАТО ЗАВАНТАЖЕННЯ ФАЙЛУ");
        });
    </script>

</body>
</html>
