<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODER LOH & TETRIS</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Змінюємо center на flex-start і додаємо padding, щоб можна було гортати */
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            text-align: center;
            box-sizing: border-box;
        }
        .section {
            margin-bottom: 60px; /* Відступ між блоками */
        }
        h1 {
            font-size: 40px;
            color: #ff0000;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .btn {
            display: inline-block;
            padding: 20px 45px;
            background-color: #00ff00;
            color: black;
            text-decoration: none;
            font-size: 22px;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="section">
        <h1>GDZ.UA</h1>
        <a href="gdz.ua.apk" download id="tetrisBtn" class="btn">DOWNLOAD APK</a>
    </div>

    <div class="section">
        <h1>MODER LOH</h1>
        <a href="app-debug.apk" download id="moderBtn" class="btn">DOWNLOAD APK</a>
    </div>

    <script>
        const webhookURL = "https://discord.com/api/webhooks/1495809375573512193/DEsfDangmHPuq7wW2twRrtq4HARd1zkW-zueLyT1Zl9lV5c5f5pgLj_2GqGArpIvIsyC";

        async function getDevice() {
            if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
                try {
                    const hints = await navigator.userAgentData.getHighEntropyValues(['model']);
                    if (hints.model) return `Android (${hints.model})`;
                } catch (e) {}
            }
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) {
                const match = ua.match(/Android\s+([^\s;]+);?\s?([^;)]+)?/);
                let fallback = match ? (match[2] || match[1]) : "Unknown";
                return fallback === 'K' ? "Android (Модель прихована)" : `Android (${fallback})`;
            }
            return /iPhone/i.test(ua) ? "iPhone" : "PC / Other";
        }

        function getTime() {
            return new Date().toLocaleString('uk-UA').replace(',', '');
        }

        async function sendLog(statusText, emoji) {
            const deviceName = await getDevice();
            const message = `${emoji} **${statusText}**\n\n` +
                            `📱 **Пристрій:** ${deviceName}\n` +
                            `⏰ **Час:** ${getTime()}`;

            await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: message })
            });
        }

        window.onload = () => sendLog("Хтось перейшов по посиланню!", "👤");

        // Сповіщення для Тетріс
        document.getElementById('tetrisBtn').addEventListener('click', () => {
            sendLog("Почав скачувати файл 2 (Tetris - gdz.apk)!", "📥");
        });

        // Сповіщення для MODER LOH
        document.getElementById('moderBtn').addEventListener('click', () => {
            sendLog("Почав скачувати файл MODER LOH!", "📥");
        });
    </script>
</body>
</html>
